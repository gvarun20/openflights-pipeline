name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: openflights-pipeline

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openflights
          POSTGRES_PASSWORD: openflights
          POSTGRES_DB: openflights_dw
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: openflights-pipeline/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 etl/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run pytest
        run: python -m pytest tests/ -v --cov=etl --cov-report=xml
        env:
          PYTHONPATH: .
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openflights_dw
          DB_USER: openflights
          DB_PASSWORD: openflights

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: openflights-pipeline/coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Build Docker image
        run: docker build -t openflights-etl:latest .

      - name: Test Docker image
        run: docker run openflights-etl:latest python -m etl.run_etl --help
