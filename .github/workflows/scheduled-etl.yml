name: Scheduled Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: openflights-pipeline

jobs:
  refresh:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openflights
          POSTGRES_PASSWORD: openflights
          POSTGRES_DB: openflights_dw
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: openflights-pipeline/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run ETL and data quality checks
        run: python -m etl.run_etl --init --validate
        env:
          PYTHONPATH: .
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openflights_dw
          DB_USER: openflights
          DB_PASSWORD: openflights

      - name: Export dashboard snapshot
        run: python dashboard/export_snapshot.py
        env:
          PYTHONPATH: .
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: openflights_dw
          DB_USER: openflights
          DB_PASSWORD: openflights

      - name: Commit refreshed dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../docs/data.json ../docs/data.js dashboard/demo_data.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data from scheduled ETL"
          git push
